apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-sa
  namespace: k8sgt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8sgpt-rolebinding
  namespace: k8sgt
subjects:
- kind: ServiceAccount
  name: k8sgpt-sa
  namespace: k8sgt
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
